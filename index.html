<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3214 Final Exam</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #dce8f0;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    #fsBtn {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 9999;
      padding: 10px 20px;
      font-size: 16px;
      background: #444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #fsBtn:hover {
      background: #222;
    }

    .page {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: #f5f0e8;
      padding: clamp(16px, 3vw, 40px);
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: clamp(16px, 2.5vw, 30px);
      font-size: clamp(24px, 4vw, 48px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: clamp(20px, 3vw, 40px);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    th, td {
      border: 1px solid #bbb;
      padding: clamp(8px, 1.5vw, 16px)
               clamp(6px, 1vw, 14px);
      text-align: center;
      font-size: clamp(14px, 2vw, 22px);
      font-weight: 700;
    }

    thead tr th {
      background: #1a1a1a;
      color: white;
      font-weight: 700;
      letter-spacing: 0.03em;
      border-color: #333;
    }

    tr.row-17470 {
      background: #d0f0f8;
      color: #002030;
    }

    tr.row-17470 td {
      border-color: #8dcfe6;
    }

    .timer-section {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      padding: clamp(12px, 2vw, 24px);
      margin-bottom: clamp(12px, 2vw, 20px);
      border: 2px solid #ddd;
      border-radius: 10px;
      background: #ece7dd;
    }

    .label {
      font-size: clamp(16px, 2.5vw, 30px);
      font-weight: bold;
      text-align: left;
    }

    .timer {
      font-size: clamp(28px, 5vw, 60px);
      color: #1a1a1a;
      font-weight: bold;
      text-align: center;
    }

    .timer-btn {
      text-align: right;
    }

    .timer-btn button {
      padding: clamp(8px, 1.2vw, 16px)
               clamp(16px, 2.5vw, 36px);
      font-size: clamp(14px, 1.8vw, 24px);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #007bff;
      color: white;
      margin-left: 10px;
      transition: background 0.2s;
    }

    .timer-btn button:hover {
      background: #0056b3;
    }

    :fullscreen .page {
      min-height: 100vh;
      align-items: center;
      padding: 20px;
    }

    :fullscreen .container {
      max-width: 100%;
    }

    @media (max-width: 700px) {
      .timer-section {
        grid-template-columns: 1fr;
        gap: 16px;
        text-align: center;
      }

      .label,
      .timer,
      .timer-btn {
        text-align: center;
      }

      .timer-btn button {
        margin: 5px;
      }
    }
  </style>
</head>

<body>

  <button id="fsBtn" onclick="toggleFullscreen()">
    ⛶ Fullscreen
  </button>

  <div class="page">
    <div class="container">

      <h1>3214 Final Exam</h1>

      <table>
        <thead>
          <tr>
            <th>CRN</th>
            <th>Days</th>
            <th>Time</th>
            <th>Classroom</th>
          </tr>
        </thead>

        <tbody>
          <tr class="row-17470">
            <td>17470</td>
            <td>TR</td>
            <td>9:30 am – 10:45 am</td>
            <td>MCB 316</td>
          </tr>
        </tbody>
      </table>

      <!-- Exam Timer -->
      <div class="timer-section">

        <div class="label">
          Exam Timer
        </div>

        <div class="timer" id="examTimer">
          02:00:00
        </div>

        <div class="timer-btn">
          <button onclick="startTimer()">
            Start
          </button>

          <button onclick="resetTimer()">
            Reset
          </button>
        </div>

      </div>

    </div>
  </div>

  <script>

    let duration = 2 * 60 * 60;
    let remaining = duration;

    let running = false;
    let interval = null;

    const display =
      document.getElementById('examTimer');

    function formatTime(seconds) {

      const h = Math.floor(seconds / 3600);

      const m = Math.floor(
        (seconds % 3600) / 60
      );

      const s = seconds % 60;

      return (
        String(h).padStart(2, '0') + ':' +
        String(m).padStart(2, '0') + ':' +
        String(s).padStart(2, '0')
      );
    }

    function updateDisplay() {

      display.textContent =
        formatTime(remaining);
    }

    function startTimer() {

      if (running) return;

      running = true;

      interval = setInterval(() => {

        remaining--;

        updateDisplay();

        if (remaining <= 0) {

          clearInterval(interval);

          running = false;

          remaining = 0;

          updateDisplay();

          alert('Exam Time is Up!');
        }

      }, 1000);
    }

    function resetTimer() {

      clearInterval(interval);

      running = false;

      remaining = duration;

      updateDisplay();
    }

    function toggleFullscreen() {

      if (!document.fullscreenElement) {

        document.documentElement
          .requestFullscreen()
          .catch(err => {

            alert(
              'Fullscreen not available: ' +
              err.message
            );
          });

      } else {

        document.exitFullscreen();
      }
    }

    document.addEventListener(
      'fullscreenchange',
      () => {

        const btn =
          document.getElementById('fsBtn');

        btn.textContent =
          document.fullscreenElement
            ? '✕ Exit Fullscreen'
            : '⛶ Fullscreen';
      }
    );

    updateDisplay();

  </script>

</body>
</html>
